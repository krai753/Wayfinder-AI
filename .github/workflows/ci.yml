name: CI

# One single CI workflow — typecheck + build + backend syntax.
# No duplicates, no Lint that's just `continue-on-error: true` with
# tsc again, no artifact uploads. Just the essentials.

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  # ── Frontend: type-check + build ─────────────────────────────
  frontend:
    name: Frontend (typecheck + build)
    runs-on: ubuntu-latest
    timeout-minutes: 12
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund
        env:
          CI: true

      - name: TypeScript type-check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          CI: true

      - name: Upload dist artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 7
          if-no-files-found: warn

  # ── Backend: Python syntax check ─────────────────────────────
  backend:
    name: Backend (Python syntax)
    runs-on: ubuntu-latest
    timeout-minutes: 6
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Byte-compile (syntax check)
        run: |
          python -m compileall -q app.py config.py database.py duffel_client.py llm_orchestrator.py models.py voice_engine.py wizard_manager.py airport_data.py routers/

      - name: Parse all Python files
        run: |
          python -c "
          import ast, pathlib, sys
          files = list(pathlib.Path('.').rglob('*.py'))
          bad = []
          for f in files:
              if 'venv' in f.parts or '__pycache__' in f.parts: continue
              try:
                  ast.parse(f.read_text(encoding='utf-8'))
              except SyntaxError as e:
                  bad.append(f'{f}: {e}')
          if bad:
              print('SYNTAX ERRORS:')
              for b in bad: print(' ', b)
              sys.exit(1)
          print(f'OK: parsed {len(files)} python files')
          "
