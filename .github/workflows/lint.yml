name: Lint

on:
  push:
    branches: [main, master, develop]
  pull_request:

jobs:
  eslint:
    name: Frontend lint (best-effort)
    runs-on: ubuntu-latest
    timeout-minutes: 8
    continue-on-error: true
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci --no-audit --no-fund
        env:
          CI: true

      - name: TypeScript no-unused check
        run: |
          npx tsc --noEmit --noUnusedLocals --noUnusedParameters 2>&1 | tee /tmp/tsc.log
          # Don't fail the build for unused warnings — we still want to see them
          echo "TypeScript check complete (warnings above don't block the build)"
