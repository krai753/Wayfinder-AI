name: Frontend Build

on:
  push:
    branches: [main, master]
    paths:
      - "frontend/**"
  pull_request:
    paths:
      - "frontend/**"
  workflow_dispatch:

jobs:
  build:
    name: Build & verify
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci --no-audit --no-fund

      - name: Type check
        run: npx tsc --noEmit

      - name: Build production bundle
        run: npm run build
        env:
          CI: true

      - name: Verify dist output
        run: |
          test -d dist
          test -f dist/index.html
          echo "Build size:"
          du -sh dist

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: wayfinder-frontend
          path: frontend/dist
          retention-days: 14
