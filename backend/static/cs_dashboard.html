<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Wayfinder CS Agent Dashboard</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#060912;color:#fff;min-height:100vh;overflow:hidden}
.flex{display:flex}.flex-col{flex-direction:column}.flex-1{flex:1}.items-center{align-items:center}.justify-between{justify-content:space-between}.gap-2{gap:8px}.gap-3{gap:12px}.gap-4{gap:16px}
.text-xs{font-size:11px}.text-sm{font-size:13px}.text-lg{font-size:18px}.font-bold{font-weight:700}.font-semibold{font-weight:600}
.truncate{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:4px}

/* Layout */
.app{display:flex;height:100vh}
.sidebar{width:320px;display:flex;flex-direction:column;border-right:1px solid rgba(255,255,255,0.06);background:rgba(13,18,33,0.9);flex-shrink:0}
.main{flex:1;display:flex;flex-direction:column}

/* Header */
.header{padding:20px 20px 16px;border-bottom:1px solid rgba(255,255,255,0.06)}
.header h1{font-size:18px;font-weight:700;color:#fff;display:flex;align-items:center;gap:10px}
.header h1 .icon{width:28px;height:28px;border-radius:8px;background:linear-gradient(135deg,#4F46E5,#6366f1);display:flex;align-items:center;justify-content:center;font-size:14px}
.header .sub{font-size:11px;color:#64748B;margin-top:4px}

/* Tickets */
.ticket-list{flex:1;overflow-y:auto}
.ticket{padding:14px 20px;border-bottom:1px solid rgba(255,255,255,0.04);cursor:pointer;transition:background 0.15s;position:relative}
.ticket:hover{background:rgba(255,255,255,0.03)}
.ticket.active{background:rgba(79,70,229,0.08);border-left:3px solid #4F46E5}
.ticket .top{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.ticket .name{font-size:13px;font-weight:600;color:#fff;flex:1}
.ticket .badge{font-size:9px;font-weight:700;text-transform:uppercase;padding:2px 6px;border-radius:4px;letter-spacing:0.5px}
.badge-open{background:rgba(245,158,11,0.12);color:#F59E0B;border:1px solid rgba(245,158,11,0.2)}
.badge-assigned{background:rgba(79,70,229,0.12);color:#818CF8;border:1px solid rgba(79,70,229,0.2)}
.badge-closed{background:rgba(34,197,94,0.12);color:#22C55E;border:1px solid rgba(34,197,94,0.2)}
.ticket .preview{font-size:11px;color:#64748B;margin-bottom:2px}
.ticket .time{font-size:9px;color:#475569}
.ticket .notification-dot{position:absolute;right:16px;top:16px;width:8px;height:8px;border-radius:50%;background:#EF4444;box-shadow:0 0 8px rgba(239,68,68,0.5);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;padding:40px;text-align:center;color:#64748B}
.empty-state .icon{font-size:48px;margin-bottom:12px;opacity:0.3}
.empty-state p{font-size:13px}.empty-state .sub{font-size:10px;color:#475569;margin-top:4px}

/* Notification banner */
.notif-banner{display:none;padding:10px 20px;background:rgba(239,68,68,0.1);border-bottom:1px solid rgba(239,68,68,0.2);font-size:12px;color:#FCA5A5;align-items:center;gap:8px}
.notif-banner.show{display:flex}
.notif-banner .dismiss{margin-left:auto;cursor:pointer;padding:4px;border-radius:4px;font-size:14px;color:#FCA5A5;background:transparent;border:none}
.notif-banner .dismiss:hover{background:rgba(255,255,255,0.1)}

/* Chat area */
.chat-header{padding:16px 24px;border-bottom:1px solid rgba(255,255,255,0.06);display:flex;align-items:center;gap:12px}
.chat-header .avatar{width:36px;height:36px;border-radius:50%;background:rgba(79,70,229,0.15);display:flex;align-items:center;justify-content:center;color:#4F46E5;font-size:14px;font-weight:700}
.chat-header .info{flex:1}
.chat-header .info .name{font-size:13px;font-weight:600;color:#fff}
.chat-header .info .meta{font-size:10px;color:#64748B}
.chat-header .actions{display:flex;gap:8px}
.chat-header button{padding:6px 12px;border-radius:8px;font-size:10px;font-weight:600;cursor:pointer;border:none;transition:opacity 0.15s}
.chat-header button:hover{opacity:0.85}
.btn-resolve{background:rgba(34,197,94,0.12);color:#22C55E;border:1px solid rgba(34,197,94,0.2)!important}
.btn-book{background:rgba(79,70,229,0.12);color:#818CF8;border:1px solid rgba(79,70,229,0.2)!important}

/* Messages */
.messages{flex:1;overflow-y:auto;padding:20px 24px;display:flex;flex-direction:column;gap:12px}
.msg{max-width:75%;padding:10px 16px;border-radius:14px;font-size:13px;line-height:1.5}
.msg.user{background:rgba(255,255,255,0.08);align-self:flex-start;border-top-left-radius:4px}
.msg.agent{background:linear-gradient(135deg,#4F46E5,#6366f1);align-self:flex-end;border-top-right-radius:4px}
.msg.system{align-self:center;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);font-size:11px;color:#64748B;font-style:italic;padding:6px 14px;border-radius:20px}
.msg .meta{font-size:9px;margin-top:4px;opacity:0.5}

/* Chat input */
.chat-input{padding:16px 24px;border-top:1px solid rgba(255,255,255,0.06)}
.chat-input .row{display:flex;align-items:center;gap:10px;background:rgba(21,28,47,0.8);border:1px solid rgba(255,255,255,0.06);border-radius:16px;padding:6px 6px 6px 16px}
.chat-input input{flex:1;background:transparent;border:none;color:#fff;font-size:13px;outline:none;padding:8px 0}
.chat-input input::placeholder{color:#64748B}
.chat-input .send-btn{width:38px;height:38px;border-radius:10px;border:none;background:linear-gradient(135deg,#4F46E5,#6366f1);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:opacity 0.15s}
.chat-input .send-btn:disabled{opacity:0.3;cursor:default}

/* Tabs */
.tabs{display:flex;border-bottom:1px solid rgba(255,255,255,0.06)}
.tab{padding:10px 24px;font-size:12px;font-weight:600;color:#64748B;cursor:pointer;border-bottom:2px solid transparent;transition:all 0.15s}
.tab:hover{color:#94A3B8}
.tab.active{color:#4F46E5;border-bottom-color:#4F46E5}

/* Booking Form */
.booking-form{flex:1;overflow-y:auto;padding:24px}
.booking-form .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.booking-form .full{grid-column:1/-1}
.booking-form label{display:block;font-size:11px;font-weight:600;color:#64748B;margin-bottom:4px;text-transform:uppercase;letter-spacing:0.5px}
.booking-form input,.booking-form select{width:100%;padding:10px 14px;border-radius:10px;border:1px solid rgba(255,255,255,0.08);background:rgba(21,28,47,0.8);color:#fff;font-size:13px;outline:none;transition:border-color 0.15s}
.booking-form input:focus,.booking-form select:focus{border-color:rgba(79,70,229,0.5)}
.booking-form input::placeholder{color:#475569}
.booking-form select option{background:#0B1020;color:#fff}
.booking-form .submit-btn{width:100%;padding:14px;border-radius:12px;border:none;background:linear-gradient(135deg,#4F46E5,#6366f1);color:#fff;font-size:14px;font-weight:700;cursor:pointer;margin-top:8px;transition:opacity 0.15s}
.booking-form .submit-btn:hover{opacity:0.9}
.booking-form .submit-btn:disabled{opacity:0.4;cursor:default}
.booking-form .result{margin-top:12px;padding:12px 16px;border-radius:10px;font-size:12px;display:none}
.booking-form .result.success{display:block;background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.2);color:#22C55E}
.booking-form .result.error{display:block;background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.2);color:#FCA5A5}
.booking-form .result.loading{display:block;background:rgba(79,70,229,0.1);border:1px solid rgba(79,70,229,0.2);color:#818CF8}

/* No ticket selected */
.no-ticket{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px;text-align:center}
.no-ticket .icon{width:80px;height:80px;border-radius:50%;background:rgba(79,70,229,0.08);border:2px solid rgba(79,70,229,0.12);display:flex;align-items:center;justify-content:center;font-size:32px;margin-bottom:20px}
.no-ticket h2{font-size:18px;font-weight:700;color:#fff;margin-bottom:6px}
.no-ticket p{font-size:12px;color:#64748B;max-width:300px;text-align:center;margin-bottom:16px}
.no-ticket .steps{display:flex;gap:16px;font-size:10px;color:#475569}
.no-ticket .steps span{display:flex;align-items:center;gap:4px}

/* Toast */
.toast{position:fixed;top:20px;right:20px;padding:12px 20px;border-radius:10px;font-size:13px;font-weight:600;z-index:9999;opacity:0;transform:translateY(-20px);transition:all 0.3s;max-width:360px}
.toast.show{opacity:1;transform:translateY(0)}
.toast.info{background:rgba(79,70,229,0.15);border:1px solid rgba(79,70,229,0.3);color:#818CF8}
.toast.success{background:rgba(34,197,94,0.15);border:1px solid rgba(34,197,94,0.3);color:#22C55E}
.toast.error{background:rgba(239,68,68,0.15);border:1px solid rgba(239,68,68,0.3);color:#FCA5A5}

/* Notification counter in sidebar header */
.notif-counter{display:none;background:#EF4444;color:#fff;font-size:9px;font-weight:700;padding:2px 7px;border-radius:10px;margin-left:8px;line-height:1.4}
.notif-counter.show{display:inline-block}
</style>
</head>
<body>
<div class="app">
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="header">
      <h1>
        <span class="icon">🎧</span>
        CS Agent Dashboard
        <span class="notif-counter" id="notifCounter">0</span>
      </h1>
      <div class="sub" id="agentInfo">
        <span id="agentName">Agent</span> · <span id="ticketCount">0</span> tickets
      </div>
    </div>
    <div class="notif-banner" id="notifBanner">
      🔔 New ticket arrived!
      <button class="dismiss" onclick="dismissNotif()">✕</button>
    </div>
    <div class="ticket-list" id="ticketList"></div>
  </div>

  <!-- Main -->
  <div class="main">
    <div id="noTicket" class="no-ticket">
      <div class="icon">🎧</div>
      <h2>Wayfinder CS Dashboard</h2>
      <p>Select a ticket from the sidebar to start helping a customer. New tickets appear automatically.</p>
      <div class="steps">
        <span>🔔 Auto-refresh</span>
        <span>💬 Live chat</span>
        <span>✈️ Book for user</span>
      </div>
    </div>

    <div id="ticketPanel" style="display:none;flex:1;display:none;flex-direction:column">
      <!-- Tabs -->
      <div class="tabs">
        <div class="tab active" data-tab="chat" onclick="switchTab('chat')">💬 Chat</div>
        <div class="tab" data-tab="booking" onclick="switchTab('booking')">✈️ Book Flight</div>
      </div>

      <!-- Chat Tab -->
      <div id="chatTab" class="flex-col" style="flex:1;display:flex">
        <div class="chat-header">
          <div class="avatar" id="chatAvatar">U</div>
          <div class="info">
            <div class="name" id="chatUserName">User</div>
            <div class="meta" id="chatMeta">Ticket: ---</div>
          </div>
          <div class="actions">
            <button class="btn-book" onclick="switchTab('booking')">✈️ Book Flight</button>
            <button class="btn-resolve" onclick="closeTicket()">✅ Resolve</button>
          </div>
        </div>
        <div class="messages" id="messages"></div>
        <div class="chat-input">
          <div class="row">
            <input id="msgInput" placeholder="Type your response..." onkeydown="if(event.key==='Enter')sendMsg()">
            <button class="send-btn" id="sendBtn" onclick="sendMsg()">➤</button>
          </div>
        </div>
      </div>

      <!-- Booking Tab -->
      <div id="bookingTab" class="flex-col" style="flex:1;display:none">
        <div class="booking-form">
          <div class="grid">
            <div class="full">
              <label>Passenger Full Name</label>
              <input id="bkName" placeholder="e.g. John Smith">
            </div>
            <div>
              <label>Origin</label>
              <input id="bkOrigin" placeholder="e.g. LHR" maxlength="3" style="text-transform:uppercase">
            </div>
            <div>
              <label>Destination</label>
              <input id="bkDest" placeholder="e.g. NRT" maxlength="3" style="text-transform:uppercase">
            </div>
            <div>
              <label>Departure Date</label>
              <input id="bkDate" type="date">
            </div>
            <div>
              <label>Passengers</label>
              <select id="bkPassengers">
                <option value="1">1 Adult</option>
                <option value="2">2 Adults</option>
                <option value="3">3 Adults</option>
                <option value="4">4 Adults</option>
                <option value="5">5 Adults</option>
              </select>
            </div>
            <div>
              <label>Cabin Class (Seat)</label>
              <select id="bkSeat">
                <option value="economy">Economy</option>
                <option value="premium_economy">Premium Economy</option>
                <option value="business">Business</option>
                <option value="first">First Class</option>
              </select>
            </div>
            <div>
              <label>Max Budget (£)</label>
              <input id="bkBudget" type="number" placeholder="e.g. 500" min="0">
            </div>
            <div>
              <label>&nbsp;</label>
              <button class="submit-btn" id="bkSubmit" onclick="agentBookFlight()">🔍 Search & Book for User</button>
            </div>
          </div>
          <div class="result" id="bkResult"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════════════════════
const API = window.location.origin + '/api';

// ═══════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════
let tickets = [];
let activeTicketId = null;
let lastTicketCount = 0;
let prevTicketIds = new Set();
let agentName = localStorage.getItem('cs_agent_name') || 'Agent Smith';
let seenTickets = new Set(JSON.parse(localStorage.getItem('cs_seen_tickets') || '[]'));

document.getElementById('agentName').textContent = agentName;

// ═══════════════════════════════════════════════════════════════
// POLL: Tickets every 3s
// ═══════════════════════════════════════════════════════════════
async function fetchTickets() {
  try {
    const res = await fetch(`${API}/cs/tickets`);
    const data = await res.json();
    const newIds = new Set(data.tickets.map(t => t.id));

    // Check for new tickets
    for (const t of data.tickets) {
      if (!seenTickets.has(t.id) && t.status !== 'closed') {
        if (prevTicketIds.size > 0) {
          showNotifBanner(`🔔 New ticket from ${t.user_name}`);
          showToast(`${t.user_name} needs help`, 'info');
        }
        seenTickets.add(t.id);
      }
    }
    localStorage.setItem('cs_seen_tickets', JSON.stringify([...seenTickets]));
    prevTicketIds = newIds;

    tickets = data.tickets;
    lastTicketCount = data.count;
    renderTickets();
    document.getElementById('ticketCount').textContent = tickets.filter(t => t.status !== 'closed').length;

    // Update active ticket messages if it changed
    if (activeTicketId) {
      const active = tickets.find(t => t.id === activeTicketId);
      if (active) updateChatHeader(active);
      fetchMessages();
    }
  } catch(e) { console.warn('Fetch tickets failed:', e); }
}

setInterval(fetchTickets, 3000);
fetchTickets();

// ═══════════════════════════════════════════════════════════════
// RENDER TICKETS
// ═══════════════════════════════════════════════════════════════
function renderTickets() {
  const el = document.getElementById('ticketList');
  const openTickets = tickets.filter(t => t.status !== 'closed');
  const closedTickets = tickets.filter(t => t.status === 'closed');

  let html = '';

  if (tickets.length === 0) {
    html = `<div class="empty-state"><div class="icon">🎧</div><p>No tickets yet</p><div class="sub">Tickets appear here when users need CS support</div></div>`;
    el.innerHTML = html;
    return;
  }

  // Open tickets
  for (const t of openTickets) {
    html += renderTicket(t);
  }

  // Closed tickets
  if (closedTickets.length > 0) {
    html += `<div style="padding:12px 20px;font-size:10px;color:#475569;text-transform:uppercase;letter-spacing:0.5px">Resolved (${closedTickets.length})</div>`;
    for (const t of closedTickets) {
      html += renderTicket(t);
    }
  }

  el.innerHTML = html;
}

function renderTicket(t) {
  const isActive = t.id === activeTicketId;
  const badgeClass = t.status === 'open' ? 'badge-open' : t.status === 'assigned' ? 'badge-assigned' : 'badge-closed';
  const badgeLabel = t.status === 'open' ? 'New' : t.status === 'assigned' ? 'Active' : 'Done';
  const timeAgo = timeSince(t.created_at);
  const isNew = !seenTickets.has(t.id) && t.status !== 'closed';
  return `<div class="ticket ${isActive ? 'active':''}" onclick="selectTicket('${t.id}')">
    ${isNew ? '<div class="notification-dot"></div>' : ''}
    <div class="top">
      <span class="name">${escHtml(t.user_name)}</span>
      <span class="badge ${badgeClass}">${badgeLabel}</span>
    </div>
    <div class="preview">${escHtml(t.last_message || t.issue || 'No messages yet')}</div>
    <div class="time">${timeAgo} · ${t.message_count || 0} msgs</div>
  </div>`;
}

// ═══════════════════════════════════════════════════════════════
// SELECT TICKET
// ═══════════════════════════════════════════════════════════════
async function selectTicket(id) {
  activeTicketId = id;
  seenTickets.add(id);
  localStorage.setItem('cs_seen_tickets', JSON.stringify([...seenTickets]));

  document.getElementById('noTicket').style.display = 'none';
  document.getElementById('ticketPanel').style.display = 'flex';
  document.getElementById('ticketPanel').style.flexDirection = 'column';

  // Auto-assign if open
  const ticket = tickets.find(t => t.id === id);
  if (ticket && ticket.status === 'open') {
    try {
      await fetch(`${API}/cs/tickets/${id}/assign?agent_id=${encodeURIComponent(agentName)}`, { method: 'POST' });
      showToast(`Assigned ticket ${id} to you`, 'success');
    } catch(e) {}
  }

  updateChatHeader(ticket);
  renderTickets();
  fetchMessages();
  switchTab('chat');
}

function updateChatHeader(ticket) {
  if (!ticket) return;
  document.getElementById('chatAvatar').textContent = (ticket.user_name || 'U')[0].toUpperCase();
  document.getElementById('chatUserName').textContent = ticket.user_name || 'Guest';
  document.getElementById('chatMeta').textContent = `Ticket: ${ticket.id} · ${ticket.status}`;
  // Pre-fill booking form
  document.getElementById('bkName').value = ticket.user_name || '';
}

// ═══════════════════════════════════════════════════════════════
// MESSAGES
// ═══════════════════════════════════════════════════════════════
let lastMsgCount = 0;

async function fetchMessages() {
  if (!activeTicketId) return;
  try {
    const res = await fetch(`${API}/cs/tickets/${activeTicketId}/messages`);
    const data = await res.json();
    const msgs = data.messages || [];

    if (msgs.length !== lastMsgCount) {
      renderMessages(msgs);
      lastMsgCount = msgs.length;
    }
  } catch(e) {}
}

function renderMessages(msgs) {
  const el = document.getElementById('messages');
  if (!msgs || msgs.length === 0) {
    el.innerHTML = `<div class="empty-state" style="height:100%"><div class="icon">💬</div><p>No messages yet</p><div class="sub">Send a message to start the conversation</div></div>`;
    return;
  }
  el.innerHTML = msgs.map(m => {
    const senderClass = m.sender === 'agent' ? 'agent' : m.sender === 'system' ? 'system' : 'user';
    return `<div class="msg ${senderClass}">
      ${escHtml(m.message)}
      <div class="meta">${m.sender === 'agent' ? agentName : m.sender === 'system' ? 'System' : 'User'} · ${timeSince(m.created_at)}</div>
    </div>`;
  }).join('');
  el.scrollTop = el.scrollHeight;
}

// Send message
async function sendMsg() {
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text || !activeTicketId) return;

  input.value = '';
  document.getElementById('sendBtn').disabled = true;

  try {
    await fetch(`${API}/cs/tickets/${activeTicketId}/message?sender=agent&message=${encodeURIComponent(text)}`, { method: 'POST' });
    lastMsgCount = 0; // Force refresh
    await fetchMessages();
  } catch(e) {
    showToast('Failed to send message', 'error');
  }
  document.getElementById('sendBtn').disabled = false;
}

// ═══════════════════════════════════════════════════════════════
// CLOSE TICKET
// ═══════════════════════════════════════════════════════════════
async function closeTicket() {
  if (!activeTicketId) return;
  try {
    await fetch(`${API}/cs/tickets/${activeTicketId}/close`, { method: 'POST' });
    showToast('Ticket resolved ✅', 'success');
    activeTicketId = null;
    document.getElementById('noTicket').style.display = 'flex';
    document.getElementById('ticketPanel').style.display = 'none';
    fetchTickets();
  } catch(e) {
    showToast('Failed to close ticket', 'error');
  }
}

// ═══════════════════════════════════════════════════════════════
// AGENT BOOKING
// ═══════════════════════════════════════════════════════════════
async function agentBookFlight() {
  const name = document.getElementById('bkName').value.trim();
  const origin = document.getElementById('bkOrigin').value.trim().toUpperCase();
  const dest = document.getElementById('bkDest').value.trim().toUpperCase();
  const date = document.getElementById('bkDate').value;
  const passengers = parseInt(document.getElementById('bkPassengers').value);
  const seat = document.getElementById('bkSeat').value;
  const budget = document.getElementById('bkBudget').value;

  // Validate
  if (!name) return showBookingResult('Please enter passenger name', 'error');
  if (!origin || origin.length !== 3) return showBookingResult('Enter a valid 3-letter origin IATA code (e.g. LHR)', 'error');
  if (!dest || dest.length !== 3) return showBookingResult('Enter a valid 3-letter destination IATA code (e.g. NRT)', 'error');
  if (!date) return showBookingResult('Please select a departure date', 'error');

  const btn = document.getElementById('bkSubmit');
  btn.disabled = true;
  btn.textContent = '🔍 Searching...';
  showBookingResult('Searching flights...', 'loading');

  try {
    // Step 1: Search flights
    let searchUrl = `${API}/flights/search?origin=${origin}&destination=${dest}&departure_date=${date}&passengers=${passengers}`;

    let res = await fetch(searchUrl, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ origin, destination, departure_date: date, passengers })
    });

    // Try the budget endpoint if available
    if (budget) {
      res = await fetch(`${API}/flights/budget?origin=${origin}&destination=${dest}&departure_date=${date}&max_price=${budget}&passengers=${passengers}`);
    }

    const data = await res.json();

    let offers = data.offers || data;
    if (!Array.isArray(offers)) offers = [];

    if (offers.length === 0) {
      showBookingResult('No flights found. Try different dates or routes.', 'error');
      btn.disabled = false;
      btn.textContent = '🔍 Search & Book for User';
      return;
    }

    // Pick cheapest
    const cheapest = offers.reduce((a, b) => {
      const pa = parseFloat(a.price || a.total_amount || 0);
      const pb = parseFloat(b.price || b.total_amount || 0);
      return pa < pb ? a : b;
    }, offers[0]);

    showBookingResult(
      `Found ${offers.length} flights! Cheapest: ${cheapest.airline || 'Unknown'} ${cheapest.flight_number || ''} — £${cheapest.price || cheapest.total_amount || 'N/A'} · ${cheapest.origin || origin} → ${cheapest.destination || dest} on ${cheapest.departure_date || date}`,
      'loading'
    );

    // Step 2: Create a booking session and book
    btn.textContent = '✈️ Booking...';

    // Create wizard session
    const sessionRes = await fetch(`${API}/wizard/session`, { method: 'POST' });
    const sessionData = await sessionRes.json();
    const sessionId = sessionData.id || sessionData.session_id;

    // Create booking directly
    const bookRes = await fetch(`${API}/booking/create`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        session_id: sessionId,
        origin, destination,
        departure_date: date,
        passenger_name: name,
        total_amount: cheapest.price || cheapest.total_amount || '0',
        booking_reference: `CS-${Date.now().toString(36).toUpperCase()}`,
      })
    });

    const booking = await bookRes.json();

    // Send system message to ticket
    const bookSummary = `✈️ **Agent booked flight for ${name}**: ${origin} → ${dest} on ${date}, ${cheapest.airline || ''} ${cheapest.price || ''}`;
    await fetch(`${API}/cs/tickets/${activeTicketId}/message?sender=system&message=${encodeURIComponent(bookSummary)}`, { method: 'POST' });

    showBookingResult(
      `✅ BOOKING CONFIRMED! ${origin} → ${dest} on ${date}. Passenger: ${name}. Ref: ${booking.booking_reference || booking.id || 'N/A'}.`,
      'success'
    );
    btn.textContent = '✅ Booked! Book Another';
    lastMsgCount = 0;
    fetchMessages();

  } catch(e) {
    showBookingResult(`Booking failed: ${e.message}`, 'error');
    btn.disabled = false;
    btn.textContent = '🔍 Search & Book for User';
  }
}

function showBookingResult(msg, type) {
  const el = document.getElementById('bkResult');
  el.textContent = msg;
  el.className = 'result ' + type;
  el.style.display = 'block';
}

// ═══════════════════════════════════════════════════════════════
// TAB SWITCHING
// ═══════════════════════════════════════════════════════════════
function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelector(`.tab[data-tab="${name}"]`).classList.add('active');

  document.getElementById('chatTab').style.display = name === 'chat' ? 'flex' : 'none';
  document.getElementById('bookingTab').style.display = name === 'booking' ? 'flex' : 'none';

  if (name === 'messages') {
    lastMsgCount = 0;
    fetchMessages();
  }
}

// ═══════════════════════════════════════════════════════════════
// NOTIFICATIONS
// ═══════════════════════════════════════════════════════════════
function showNotifBanner(msg) {
  const banner = document.getElementById('notifBanner');
  banner.innerHTML = `🔔 ${msg} <button class="dismiss" onclick="dismissNotif()">✕</button>`;
  banner.classList.add('show');
  // Update counter
  const openCount = tickets.filter(t => t.status !== 'closed').length;
  const counter = document.getElementById('notifCounter');
  if (openCount > 0) {
    counter.textContent = openCount;
    counter.classList.add('show');
  }
}

function dismissNotif() {
  document.getElementById('notifBanner').classList.remove('show');
}

// ═══════════════════════════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════════════════════════
function showToast(msg, type = 'info') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast ' + type;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 4000);
}

// ═══════════════════════════════════════════════════════════════
// UTILITIES
// ═══════════════════════════════════════════════════════════════
function escHtml(str) {
  if (!str) return '';
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function timeSince(ts) {
  if (!ts) return '';
  const secs = Math.floor((Date.now() - new Date(ts).getTime()) / 1000);
  if (secs < 60) return 'just now';
  if (secs < 3600) return Math.floor(secs/60) + 'm ago';
  if (secs < 86400) return Math.floor(secs/3600) + 'h ago';
  return Math.floor(secs/86400) + 'd ago';
}

// Unfocus input sends
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    document.getElementById('msgInput').blur();
  }
});
</script>
